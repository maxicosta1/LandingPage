  <link rel="stylesheet" href="frontEnd/style.css">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "ContactPage",
    "name": "Contacto | sCode Digital Solutions",
    "url": "https://scodedigital.com/contacto.html",
    "description": "Página de contacto para solicitar desarrollo web, e-commerce, SEO y sistemas digitales.",
    "mainEntity": {
      "@type": "Organization",
      "name": "sCode Digital Solutions",
      "url": "https://scodedigital.com/",
      "email": "scodedigitalsolutions@gmail.com",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Mar del Plata",
        "addressCountry": "AR"
      }
    }
  }
  </script>
</head>

<body>

  <header>
    <nav>

      <div class="logo">
        <a href="index.html">sCode</a>
      </div>

      <div class="nav-center">
        <a href="index.html#nosotros"><b>Nosotros</b></a>
        <a href="index.html#servicios"><b>Servicios</b></a>
        <a href="index.html#proyectos"><b>Proyectos</b></a>
        <a href="faq.html"><b>FAQ</b></a>
      </div>

      <div class="nav-right">
        <a href="contacto.html" class="cta-btn"><b>Contactanos</b></a>
      </div>

    </nav>
  </header>
  <main id="contacto">
    <section class="contacto-page">
      <div class="faq-header">
        <span>CONTACTO</span>
        <h1>Hablemos de tu proyecto</h1>
        <p>Contanos qué necesitás y te respondemos para avanzar con una propuesta clara.</p>
      </div>
    </section>
  </main>

  <form action="https://formsubmit.co/your@email.com" method="POST" class="formulario" > 
    <label for="nombre">Nombre</label>
    <input id="nombre" name="nombre" type="text" placeholder="Tu nombre" autocomplete="name" required>

    <label for="telefono">Número de teléfono</label>
    <input id="telefono" name="telefono" type="number" placeholder="Tu número de teléfono" autocomplete="tel" required>

    <label for="mensaje">Mensaje</label>
    <textarea id="mensaje" name="mensaje" placeholder="Contanos sobre tu proyecto" rows="5"></textarea>

    <button type="submit" class="cta-btn">Enviar consulta</button>
  </form>
</body>

</html>
